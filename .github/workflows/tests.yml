name: tests

# AH-4: run the hermetic test suite on every push/PR so cap/sizing/logic regressions
# (like the stale-cap failures caught 2026-06-04) are flagged automatically.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -q
